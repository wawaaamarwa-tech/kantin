<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Registrasi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            display: flex;
            justify-content: center;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .form-container {
            width: 800px;
            background: white;
            padding: 20px;
            border: 2px solid #000;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }
        .header-line {
            border-top: 5px solid black;
            margin-bottom: 20px;
        }
        .row {
            display: flex;
            margin-bottom: 10px;
            align-items: center;
        }
        .col {
            flex: 1;
            display: flex;
            align-items: center;
        }
        label {
            width: 120px;
            font-weight: bold;
        }
        .label-sub {
            display: block;
            font-weight: normal;
            font-style: italic;
            font-size: 10px;
            margin-top: -3px;
        }
        input[type="text"], input[type="email"], input[type="tel"] {
            flex: 1;
            padding: 5px;
            border: 1px solid #000;
            margin-right: 20px;
        }
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
        }
        .checkbox-item input {
            margin-right: 10px;
        }
        .note {
            font-size: 9px;
            font-style: italic;
            color: #555;
            margin-top: 2px;
        }
        .submit-btn {
            margin-top: 30px;
            padding: 10px 25px;
            background-color: #000;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .submit-btn:hover {
            background-color: #444;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-line"></div>
    
    <form action="#" method="POST">
        <div class="row">
            <div class="col">
                <label>ID Registrasi <span class="label-sub">Registration ID</span></label>
                <span>: </span>
                <div style="flex:1; margin-right:20px;">
                    <input type="text" name="reg_id" style="width: 150px;">
                    <div class="note">*diisi oleh NetCampus</div>
                </div>
            </div>
            <div class="col">
                <label>Tanggal Daftar <span class="label-sub">Registration Date</span></label>
                <span>: </span>
                <input type="text" name="reg_date">
            </div>
        </div>

        <div class="row">
